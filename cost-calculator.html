<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cost Calculator | Nucore Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section class="section calculator-page" data-reveal>
        <div class="page-hero-copy">
          <h1>The Monish Cost Calculator</h1>
        </div>
        <div class="live-calculator" data-calculator>
          <label>GPU count <input type="range" min="8" max="512" value="64" step="8" data-gpu-count><output>64</output></label>
          <label>Monthly cost input <input type="number" value="420000" min="0" step="1000" data-monthly-cost></label>
          <label>Workload dropdown <select data-workload><option value="training">Training</option><option value="inference">Inference</option><option value="mixed">Mixed</option></select></label>
          <label>Cloud provider dropdown <select data-provider><option value="aws">AWS</option><option value="azure">Azure</option><option value="gcp">GCP</option><option value="other">Other</option></select></label>
          <div class="calc-results">
            <div><span>Estimated Nucore cost</span><strong data-nucore-cost>$0</strong><i style="--bar: 40%"></i></div>
            <div><span>Annual savings</span><strong data-savings>$0</strong><i style="--bar: 60%"></i></div>
            <div><span>Performance delta</span><strong data-delta>0%</strong><i style="--bar: 30%"></i></div>
          </div>
          <a class="home-button home-button--filled" href="mailto:hello@nucore.ai">Request a Full Analysis</a>
        </div>
      </section>
    </main>
    <script src="site.js"></script><script src="nav.js"></script><script src="scroll.js"></script>
  </body>
</html>

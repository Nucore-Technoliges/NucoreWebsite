<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Software Suite | Nucore Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section class="section centered-hero intelligence-hero" data-reveal>
        <div class="intelligence-backdrop" aria-hidden="true">
          <img src="assets/nucore-logo-white.png" alt="">
          <span></span>
        </div>
        <h1>The Intelligence Layer.</h1>
        <p>AI-powered applications built to run on Nucore infrastructure.</p>
      </section>

      <section class="section layer-section" data-reveal>
        <div class="layer-stack">
          <button class="layer-bar is-active" type="button" data-panel="Compute|Nucore GPU Systems|High-performance compute layer for private AI workloads.">
            <span>Layer 1</span><strong>Compute</strong><em>Nucore GPU Systems</em>
          </button>
          <button class="layer-bar" type="button" data-panel="Infrastructure Software|Schedulers, telemetry, and operational controls|The software substrate that keeps private GPU fleets efficient and observable.">
            <span>Layer 2</span><strong>Infrastructure Software</strong><em>Fleet control</em>
          </button>
          <button class="layer-bar" type="button" data-panel="Titan LLM + Orchestration|Private intelligence engine|Deploy proprietary intelligence across the infrastructure you own.">
            <span>Layer 3</span><strong>Titan LLM + Orchestration</strong><em>AI engine</em>
          </button>
          <button class="layer-bar" type="button" data-panel="Business Applications|Helios, Aegis, Nexus, Prometheus, Hyperion|AI-powered applications from marketing to finance, built on the Nucore stack.">
            <span>Layer 4</span><strong>Business Applications</strong><em>Operational AI</em>
          </button>
        </div>
        <aside class="layer-panel" aria-live="polite">
          <p>Compute</p>
          <h2>Nucore GPU Systems</h2>
          <span>High-performance compute layer for private AI workloads.</span>
        </aside>
      </section>
    </main>
    <script src="site.js"></script>
    <script src="nav.js"></script>
    <script src="scroll.js"></script>
  </body>
</html>
